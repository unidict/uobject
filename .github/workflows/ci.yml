name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DUOBJECT_BUILD_TESTS=ON ${{ runner.os == 'Windows' && '-DCMAKE_C_FLAGS=/std:c11' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --verbose ${{ runner.os == 'Windows' && '-C Release' || '' }}
